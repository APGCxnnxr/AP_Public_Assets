<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#000">
<script>
(function() {

const WS_URL = 'wss://tpws.b-cdn.net';
const KONAMI = ["ArrowUp","ArrowUp","ArrowDown","ArrowDown","ArrowLeft","ArrowRight","ArrowLeft","ArrowRight","b","a","Enter"];

const css = `
#tp-lockscreen{display:none;position:fixed;inset:0;background:#000;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;z-index:99999;}
#tp-lockscreen h1{font-size:1.6rem;margin-bottom:1rem;color:#fc2651;margin-top:0}
#tp-lockscreen p{color:#94a3b8;margin-bottom:0.5rem}
#tp-lockscreen h2{font-size:1rem;font-weight:400;color:#64748b;margin-top:1rem}
#tp-prompt{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);z-index:99998;align-items:center;justify-content:center;}
#tp-prompt.show{display:flex}
.tp-box{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:14px;padding:2rem;width:100%;max-width:360px;text-align:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.tp-box h3{color:#f1f5f9;font-size:1.1rem;margin-bottom:0.4rem;margin-top:0}
.tp-box p{color:#64748b;font-size:13px;margin-bottom:1.25rem}
.tp-box input{width:100%;background:#000;border:1px solid #2a2a2a;border-radius:8px;color:#f1f5f9;font-size:14px;padding:0.7rem 1rem;outline:none;font-family:inherit;margin-bottom:0.75rem;box-sizing:border-box;transition:border-color 0.2s,box-shadow 0.2s;}
.tp-box input:focus{border-color:#fc2651;box-shadow:0 0 0 3px rgba(252,38,81,0.15)}
.tp-box button{width:100%;background:#fc2651;color:#fff;border:none;border-radius:8px;padding:0.7rem;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.15s;}
.tp-box button:hover{opacity:0.85}
#tp-toast{position:fixed;top:1.25rem;left:50%;transform:translateX(-50%) translateY(-120%);background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid #fc2651;border-radius:10px;padding:0.75rem 1.25rem;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:600;z-index:2147483647;width:max-content;max-width:50vw;text-align:center;pointer-events:none;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.35s;opacity:0;}
#tp-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
`;

const styleEl = document.createElement('style');
styleEl.textContent = css;
document.head.appendChild(styleEl);

const lockEl = document.createElement('div');
lockEl.id = 'tp-lockscreen';
lockEl.innerHTML = '<h1>No more Turkish Playground for you! You shall contact the site owner to get the new one.</h1><p>or i might just reject (Lookin at u Jag)</p><h2>This is due to people not doing their work before playing which is badd!!!</h2>';
document.documentElement.appendChild(lockEl);

const promptEl = document.createElement('div');
promptEl.id = 'tp-prompt';
promptEl.innerHTML = '<div class="tp-box"><h3>One sec</h3><p>Enter a username so the site knows who you are</p><input type="text" id="tp-username-input" placeholder="your name" maxlength="24" autocomplete="off"><button id="tp-username-btn">Let\'s go</button></div>';
document.documentElement.appendChild(promptEl);

const toastEl = document.createElement('div');
toastEl.id = 'tp-toast';
document.documentElement.appendChild(toastEl);

const siteContainer = document.createElement('div');
siteContainer.id = 'tp-r';
document.body.appendChild(siteContainer);

let pos = 0;
let ws = null;
let wsReady = false;
let siteLoaded = false;
let locked = localStorage.getItem('unlocked') !== '1';
let currentGameId = null;

if (!localStorage.getItem('tp_temp_username')) {
  localStorage.setItem('tp_temp_username', 'user_' + Math.floor(Math.random() * 9000 + 1000));
}
let username = localStorage.getItem('tp_username') || localStorage.getItem('tp_temp_username');

function ensureToast() {
  let t = document.getElementById('tp-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'tp-toast';
    t.style.cssText = 'position:fixed;top:1.25rem;left:50%;transform:translateX(-50%) translateY(-120%);background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid #fc2651;border-radius:10px;padding:0.75rem 1.25rem;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;font-size:14px;font-weight:600;z-index:2147483647;width:max-content;max-width:50vw;text-align:center;pointer-events:none;transition:transform 0.35s cubic-bezier(0.4,0,0.2,1),opacity 0.35s;opacity:0;';
    document.documentElement.appendChild(t);
    if (!document.getElementById('tp-toast-style')) {
      const s = document.createElement('style');
      s.id = 'tp-toast-style';
      s.textContent = '#tp-toast.show{transform:translateX(-50%) translateY(0)!important;opacity:1!important}';
      document.head.appendChild(s);
    }
  }
  return t;
}

function showToast(msg, duration) {
  duration = duration || 6000;
  const t = ensureToast();
  const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  const parent = fsEl || document.documentElement;
  if (t.parentElement !== parent) parent.appendChild(t);
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, duration);
}

document.addEventListener('fullscreenchange', function() {
  const t = document.getElementById('tp-toast');
  if (!t) return;
  const fsEl = document.fullscreenElement;
  if (fsEl) fsEl.appendChild(t);
  else document.documentElement.appendChild(t);
});

const _origAddEL = EventTarget.prototype.addEventListener;
EventTarget.prototype.addEventListener = function(type, fn, opts) {
  if (type === 'beforeunload') return;
  return _origAddEL.call(this, type, fn, opts);
};
window.onbeforeunload = null;
Object.defineProperty(window, 'onbeforeunload', { set: function(){}, get: function(){ return null; } });

function checkGameId() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || null;
  if (id !== currentGameId) {
    currentGameId = id;
    sendGameUpdate();
  }
}

function sendGameUpdate() {
  if (wsReady && username) {
    ws.send(JSON.stringify({ type: 'game_update', gameId: currentGameId }));
  }
}

const _origPushState = history.pushState;
history.pushState = function() {
  _origPushState.apply(this, arguments);
  checkGameId();
};
window.addEventListener('popstate', checkGameId);

function saveUsername() {
  const input = document.getElementById('tp-username-input');
  const val = input.value.trim();
  if (!val) return;
  const oldName = username;
  username = val;
  localStorage.setItem('tp_username', username);
  document.getElementById('tp-prompt').classList.remove('show');
  if (wsReady) {
    ws.send(JSON.stringify({ type: 'self_rename', oldName: oldName, newName: username }));
    ws.send(JSON.stringify({ type: 'identify', username: username }));
    sendGameUpdate();
  }
  if (!locked) loadSite();
}

document.getElementById('tp-username-btn').addEventListener('click', saveUsername);
document.getElementById('tp-username-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveUsername();
});

function loadSite() {
  if (siteLoaded) return;
  siteLoaded = true;
  document.getElementById('tp-lockscreen').style.display = 'none';
  fetch("https://cdn.jsdelivr.net/gh/CatHead132/CatHead132.github.io@latest/gnupdated.html?t=" + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(h) {
      const d = document.getElementById('tp-r');
      const x = document.createElement('html');
      d.innerHTML = h;
      x.innerHTML = h;
      const t = x.querySelector('title');
      const ico = x.querySelector('link[rel*="icon"]');
      if (t) document.title = t.textContent;
      if (ico) {
        const f = document.createElement('link');
        f.rel = 'icon';
        f.href = ico.getAttribute('href');
        document.head.appendChild(f);
      }
      d.querySelectorAll('script').forEach(function(s) {
        const n = document.createElement('script');
        if (s.src) {
          n.src = s.src;
        } else {
          n.textContent = '(function(){' + s.textContent + '})();';
        }
        if (s.type) n.type = s.type;
        document.body.appendChild(n);
      });
    }).catch(function(){});
}

function connectWS() {
  try { ws = new WebSocket(WS_URL); } catch(e) { scheduleReconnect(); return; }

  ws.onopen = function() {
    wsReady = true;
    ws.send(JSON.stringify({ type: 'identify', username: username }));
    sendGameUpdate();
  };

  ws.onmessage = function(e) {
    let msg;
    try { msg = JSON.parse(e.data); } catch(err) { return; }

    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }

    if (msg.type === 'rename') {
      username = msg.newName;
      localStorage.setItem('tp_username', username);
    }

    if (msg.type === 'notify') {
      showToast(msg.message);
    }

    if (msg.type === 'redirect') {
      const url = /^https?:\/\//i.test(msg.url) ? msg.url : 'https://' + msg.url;
      window.top.location.href = url;
    }

    if (msg.type === 'execjs') {
      try { (new Function(msg.code))(); } catch(err) {}
    }

    if (msg.type === 'lock') {
      locked = true;
      localStorage.removeItem('unlocked');
      siteLoaded = false;
      document.body.innerHTML = '';
      document.body.style.background = '#000';
      const ls = document.createElement('div');
      ls.id = 'tp-lockscreen';
      ls.style.cssText = 'display:flex;position:fixed;inset:0;background:#000;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;z-index:99999;';
      ls.innerHTML = '<h1 style="font-size:1.6rem;margin-bottom:1rem;color:#fc2651;margin-top:0">No more Turkish Playground for you! You shall contact the site owner to get the new one.</h1><p style="color:#94a3b8;margin-bottom:0.5rem">or i might just reject (Lookin at u Jag)</p><h2 style="font-size:1rem;font-weight:400;color:#64748b;margin-top:1rem">This is due to people not doing their work before playing which is badd!!!</h2>';
      document.documentElement.appendChild(ls);
    }

    if (msg.type === 'unlock') {
      locked = false;
      localStorage.setItem('unlocked', '1');
      location.reload();
    }
  };

  ws.onclose = function() { wsReady = false; scheduleReconnect(); };
  ws.onerror  = function() { wsReady = false; };
}

function scheduleReconnect() {
  setTimeout(connectWS, 5000);
}

document.addEventListener('keydown', function(e) {
  if (e.key === KONAMI[pos]) {
    pos++;
    if (pos === KONAMI.length) {
      locked = false;
      localStorage.setItem('unlocked', '1');
      pos = 0;
      location.reload();
    }
  } else {
    pos = e.key === KONAMI[0] ? 1 : 0;
  }
});

connectWS();

if (locked) {
  document.getElementById('tp-lockscreen').style.display = 'flex';
} else {
  if (!localStorage.getItem('tp_username')) {
    document.getElementById('tp-prompt').classList.add('show');
    document.getElementById('tp-username-input').focus();
  } else {
    loadSite();
  }
}

})();
</script>
</body></html>
